spring.application.name=ecommerce

# CONFIGURATION BD 
spring.datasource.url=jdbc:mysql://localhost:3306/commerce?createDatabaseIfNotExist=true&useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root24P@ssword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# update met a jour la structure des qu une entite est detectee ou modifiee
spring.jpa.hibernate.ddl-auto=update

# Affiche les requetes SQL de creation et modification dans la console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- COMPATIBILITE DIALECTE ---
# Force Hibernate a utiliser un dialecte moderne pour eviter les erreurs de syntaxe SQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect